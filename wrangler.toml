name = "freemailxx"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "712097f5-0cc7-4d6d-b5d7-cbd6e420265f" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="cactusli"
ADMIN_PASSWORD="1183895890@q"
GUEST_PASSWORD="guest"
JWT_TOKEN="fjiwaiv23164s4fdsfs6df6wfdx"
JWT_TOKENGUEST_PASSWORD="dfsfsfxzcv"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="aixjah.com,xianrcb.com"
RESEND_API_KEY="DE77200313963761997926DE83500367524082965989"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

